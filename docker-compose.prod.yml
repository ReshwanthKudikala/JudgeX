# =========================================================================
# JudgeX — Production Compose Stack
# Starts the full backend runtime (API + workers) with Postgres and Redis.
#
# Usage:
#   cp .env.production.example .env.production   # edit secrets
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Dev-only infra (Postgres/Redis/Ollama for host-run apps) remains in
# docker-compose.yml — do not confuse the two files.
# =========================================================================

name: judgex-prod

services:
  postgres:
    image: postgres:17-alpine
    container_name: judgex-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-judgex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-judgex}
    volumes:
      - judgex_pgdata:/var/lib/postgresql/data
    networks:
      - judgex
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-judgex} -d ${POSTGRES_DB:-judgex}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: judgex-prod-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - judgex_redisdata:/data
    networks:
      - judgex
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    image: judgex-api:latest
    container_name: judgex-prod-api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: ${PORT:-4000}
      DATABASE_URL: postgres://${POSTGRES_USER:-judgex}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-judgex}
      REDIS_URL: redis://redis:6379
      DB_REQUIRED: "true"
      REDIS_REQUIRED: "true"
    ports:
      - "${API_HOST_PORT:-4000}:4000"
    networks:
      - judgex
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  judge-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.judge
    image: judgex-judge-worker:latest
    container_name: judgex-prod-judge-worker
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-judgex}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-judgex}
      REDIS_URL: redis://redis:6379
      DB_REQUIRED: "true"
      REDIS_REQUIRED: "true"
    volumes:
      # Host Docker daemon — required to create language sandbox containers.
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - judgex
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  cleanup-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.cleanup
    image: judgex-cleanup-worker:latest
    container_name: judgex-prod-cleanup-worker
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-judgex}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-judgex}
      REDIS_URL: redis://redis:6379
      DB_REQUIRED: "true"
      REDIS_REQUIRED: "true"
    networks:
      - judgex
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

networks:
  judgex:
    driver: bridge

volumes:
  judgex_pgdata:
    name: judgex_pgdata
  judgex_redisdata:
    name: judgex_redisdata
