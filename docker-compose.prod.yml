# =========================================================================
# JudgeX — Production Compose Stack
# Services: nginx, frontend, api (backend), worker, cleanup, postgres, redis
#
# Usage:
#   cp .env.production.example .env.production   # edit secrets
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Dev-only infra remains in docker-compose.yml.
# =========================================================================

name: judgex-prod

x-build-args: &build_args
  APP_VERSION: ${APP_VERSION:-0.1.0}
  GIT_SHA: ${GIT_SHA:-unknown}
  BUILD_TIME: ${BUILD_TIME:-}

services:
  postgres:
    image: postgres:17-alpine
    container_name: judgex-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-judgex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-judgex}
    volumes:
      - judgex_pgdata:/var/lib/postgresql/data
    networks:
      - judgex
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-judgex} -d ${POSTGRES_DB:-judgex}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: judgex-prod-redis
    restart: unless-stopped
    # AOF persistence — see docs/DEPLOYMENT.md § Backups
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec",
      ]
    volumes:
      - judgex_redisdata:/data
    networks:
      - judgex
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
      args:
        <<: *build_args
    image: judgex-api:${APP_VERSION:-latest}
    container_name: judgex-prod-api
    restart: unless-stopped
    stop_grace_period: 20s
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: ${PORT:-4000}
      DATABASE_URL: postgres://${POSTGRES_USER:-judgex}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-judgex}
      REDIS_URL: redis://redis:6379
      DB_REQUIRED: "true"
      REDIS_REQUIRED: "true"
      APP_VERSION: ${APP_VERSION:-0.1.0}
      GIT_SHA: ${GIT_SHA:-unknown}
      BUILD_TIME: ${BUILD_TIME:-}
      # Browser hits nginx origin; CORS must allow that public origin.
      CORS_ORIGIN: ${CORS_ORIGIN:?Set CORS_ORIGIN to your public site origin}
    networks:
      - judgex
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  # Alias name requested by Sprint 34: "worker"
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.judge
      args:
        <<: *build_args
    image: judgex-judge-worker:${APP_VERSION:-latest}
    container_name: judgex-prod-worker
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-judgex}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-judgex}
      REDIS_URL: redis://redis:6379
      DB_REQUIRED: "true"
      REDIS_REQUIRED: "true"
      APP_VERSION: ${APP_VERSION:-0.1.0}
      GIT_SHA: ${GIT_SHA:-unknown}
      BUILD_TIME: ${BUILD_TIME:-}
      # Project bind (not Desktop tmpfs): worker path vs host path for sandbox Binds.
      JUDGE_WORKSPACE_DIR: ${JUDGE_WORKSPACE_DIR:-/var/judgex/workspace}
      JUDGE_WORKSPACE_HOST_DIR: ${JUDGE_WORKSPACE_HOST_DIR}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.judge-workspaces:/var/judgex/workspace
    networks:
      - judgex
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  cleanup-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.cleanup
      args:
        <<: *build_args
    image: judgex-cleanup-worker:${APP_VERSION:-latest}
    container_name: judgex-prod-cleanup-worker
    restart: unless-stopped
    stop_grace_period: 20s
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-judgex}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-judgex}
      REDIS_URL: redis://redis:6379
      DB_REQUIRED: "true"
      REDIS_REQUIRED: "true"
      APP_VERSION: ${APP_VERSION:-0.1.0}
      GIT_SHA: ${GIT_SHA:-unknown}
      BUILD_TIME: ${BUILD_TIME:-}
    networks:
      - judgex
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_APP_NAME: ${VITE_APP_NAME:-JudgeX}
        VITE_APP_VERSION: ${APP_VERSION:-0.1.0}
        VITE_GIT_SHA: ${GIT_SHA:-unknown}
        VITE_BUILD_TIME: ${BUILD_TIME:-}
    image: judgex-frontend:${APP_VERSION:-latest}
    container_name: judgex-prod-frontend
    restart: unless-stopped
    networks:
      - judgex
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 20s
      timeout: 3s
      retries: 5
      start_period: 10s

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    image: judgex-nginx:${APP_VERSION:-latest}
    container_name: judgex-prod-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_HOST_PORT:-80}:80"
      # Map 443 when TLS certs are mounted (see docs/DEPLOYMENT.md).
      - "${HTTPS_HOST_PORT:-443}:443"
    volumes:
      # Optional TLS material (leave empty dir if unused).
      - ${NGINX_CERTS_DIR:-./docker/nginx/certs}:/etc/nginx/certs:ro
    networks:
      - judgex
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/nginx-health"]
      interval: 20s
      timeout: 3s
      retries: 5
      start_period: 10s

networks:
  judgex:
    driver: bridge

volumes:
  judgex_pgdata:
    name: judgex_pgdata
  judgex_redisdata:
    name: judgex_redisdata
