# Edge reverse proxy for JudgeX (HTTPS-ready).
# Terminate TLS at this layer (mount certs or terminate upstream of this container).

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  server_tokens off;

  # Compression
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # Client body limit (align with API JSON_BODY_LIMIT; submissions are smaller).
  client_max_body_size 2m;

  # Rate-limit zones (edge soft limits; API Redis rate limits remain authoritative).
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

  upstream judgex_api {
    server api:4000;
    keepalive 32;
  }

  upstream judgex_frontend {
    server frontend:80;
    keepalive 16;
  }

  # HTTP — redirect to HTTPS when TLS is configured; otherwise serve directly.
  # For local/prod-without-certs, set ENABLE_HTTPS=false and map only port 80.
  server {
    listen 80;
    server_name _;

    # Security headers (edge)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-Request-ID $request_id always;

    # Health for the proxy itself
    location = /nginx-health {
      access_log off;
      return 200 'ok';
      add_header Content-Type text/plain;
    }

    location /api/ {
      limit_req zone=api_limit burst=60 nodelay;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header Connection "";
      proxy_pass http://judgex_api;
    }

    location /api/v1/auth/ {
      limit_req zone=auth_limit burst=20 nodelay;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header Connection "";
      proxy_pass http://judgex_api;
    }

    # Prometheus scrape — restrict in real deployments via network policy.
    location = /metrics {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Connection "";
      proxy_pass http://judgex_api/metrics;
    }

    location /health {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Connection "";
      proxy_pass http://judgex_api;
    }

    location /ready {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Connection "";
      proxy_pass http://judgex_api;
    }

    location / {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      # Static assets from frontend image — long cache when fingerprinted.
      proxy_pass http://judgex_frontend;
    }
  }

  # Optional HTTPS server (uncomment / enable via compose override when certs exist).
  # server {
  #   listen 443 ssl http2;
  #   server_name judgex.example;
  #   ssl_certificate     /etc/nginx/certs/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/certs/privkey.pem;
  #   ssl_session_cache shared:SSL:10m;
  #   ssl_protocols TLSv1.2 TLSv1.3;
  #   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  #   ... same locations as above ...
  # }
}
