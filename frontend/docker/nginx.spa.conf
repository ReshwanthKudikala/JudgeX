# SPA static file server (used inside the frontend production image).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Tiny liveness for container healthchecks.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  # Cache fingerprinted assets aggressively.
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
