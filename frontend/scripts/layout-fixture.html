<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: '#0f1117',
              card: '#1a1d24',
              border: '#2b2f36',
            },
          },
        },
      };
    </script>
    <style>
      html,
      body,
      #root {
        height: 100%;
        min-height: 100%;
      }
      body {
        margin: 0;
        background: #0f1117;
        color: #c9d1d9;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="flex flex-col bg-background min-h-screen lg:h-dvh lg:overflow-hidden" id="main-layout">
        <header class="h-14 shrink-0 border-b border-border" id="navbar">Navbar</header>
        <div class="mx-auto flex w-full max-w-7xl flex-1 min-h-0" id="content-row">
          <aside class="hidden w-64 shrink-0 border-r border-border lg:block" id="sidebar">Sidebar</aside>
          <main
            class="min-w-0 flex-1 px-4 sm:px-6 flex min-h-0 flex-col py-4 lg:overflow-hidden lg:py-4"
            id="main"
          >
            <div class="flex min-h-0 flex-1 flex-col" id="page">
              <div class="flex min-h-0 flex-1 flex-col animate-fade-in lg:overflow-hidden" id="problem-layout">
                <div class="shrink-0 mb-3" id="breadcrumb">Problems / Two Sum</div>
                <div
                  class="grid min-h-0 flex-1 gap-6 lg:grid-cols-2 lg:grid-rows-[minmax(0,1fr)] lg:gap-8 lg:overflow-hidden"
                  id="grid"
                >
                  <section
                    class="min-h-0 rounded-lg border border-border bg-card p-5 sm:p-6 lg:overflow-y-auto lg:overscroll-contain"
                    aria-label="Problem statement"
                    id="statement"
                  >
                    <h1>Two Sum</h1>
                    <p id="long-content"></p>
                  </section>
                  <aside
                    class="min-h-0 rounded-lg border border-border bg-card lg:overflow-y-auto lg:overscroll-contain"
                    aria-label="Code editor panel"
                    id="editor"
                  >
                    <div class="flex min-h-[420px] flex-col lg:h-full lg:min-h-0" id="editor-inner">
                      <div class="sticky top-0 border-b border-border p-2">Toolbar</div>
                      <pre id="editor-body" style="white-space: pre-wrap; padding: 1rem"></pre>
                    </div>
                  </aside>
                </div>
              </div>
            </div>
          </main>
        </div>
      </div>
    </div>
    <script>
      document.getElementById('long-content').textContent = 'Statement line.\n'.repeat(120);
      document.getElementById('editor-body').textContent = 'code line\n'.repeat(80);
      const pick = (el, name) => {
        if (!el) return { name, missing: true };
        const cs = getComputedStyle(el);
        return {
          name,
          className: el.className,
          clientHeight: el.clientHeight,
          scrollHeight: el.scrollHeight,
          expands: el.scrollHeight > el.clientHeight + 1,
          height: cs.height,
          minHeight: cs.minHeight,
          overflowY: cs.overflowY,
        };
      };
      const de = document.documentElement;
      window.__LAYOUT__ = {
        viewport: { w: window.innerWidth, h: window.innerHeight },
        doc: {
          deScroll: de.scrollHeight,
          deClient: de.clientHeight,
          canDocumentScroll: de.scrollHeight > de.clientHeight + 1,
        },
        mainLayout: pick(document.getElementById('main-layout'), 'mainLayout'),
        main: pick(document.getElementById('main'), 'main'),
        statement: pick(document.getElementById('statement'), 'statement'),
        editor: pick(document.getElementById('editor'), 'editor'),
      };
    </script>
  </body>
</html>
